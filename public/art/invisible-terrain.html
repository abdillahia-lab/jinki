<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Terrain — Generative Topographic Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input { width: 100%; background: var(--anthropic-light); padding: 12px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center; }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #121416; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); padding: 200px 0; }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Invisible Terrain</h1>
            <div class="subtitle">Generative topographic contours — algorithmic cartography of mathematical landscapes. Each seed reveals terrain that never existed but feels inevitable.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Noise Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.003" max="0.015" step="0.001" value="0.006" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.006</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Contour Levels</label>
                    <div class="slider-container">
                        <input type="range" id="contourLevels" min="15" max="60" step="1" value="35" oninput="updateParam('contourLevels', this.value)">
                        <span class="value-display" id="contourLevels-value">35</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Octaves</label>
                    <div class="slider-container">
                        <input type="range" id="octaves" min="2" max="6" step="1" value="4" oninput="updateParam('octaves', this.value)">
                        <span class="value-display" id="octaves-value">4</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Peak Count</label>
                    <div class="slider-container">
                        <input type="range" id="peakCount" min="3" max="12" step="1" value="7" oninput="updateParam('peakCount', this.value)">
                        <span class="value-display" id="peakCount-value">7</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Line Opacity</label>
                    <div class="slider-container">
                        <input type="range" id="lineOpacity" min="0.02" max="0.2" step="0.01" value="0.08" oninput="updateParam('lineOpacity', this.value)">
                        <span class="value-display" id="lineOpacity-value">0.08</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Resolution</label>
                    <div class="slider-container">
                        <input type="range" id="gridRes" min="2" max="6" step="1" value="3" oninput="updateParam('gridRes', this.value)">
                        <span class="value-display" id="gridRes-value">3</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row" style="margin-bottom: 8px;">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
                <button class="button secondary" onclick="downloadArt()">⬇ Download PNG</button>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Generating terrain...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            noiseScale: 0.006,
            contourLevels: 35,
            octaves: 4,
            peakCount: 7,
            lineOpacity: 0.08,
            gridRes: 3
        };
        let defaultParams = {...params};
        let field = [];
        let W = 800, H = 800;

        function setup() {
            let canvas = createCanvas(W, H);
            canvas.parent('canvas-container');
            pixelDensity(1);
            noLoop();
            generateTerrain();
            document.querySelector('.loading').style.display = 'none';
        }

        function generateTerrain() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            background(18, 20, 22);

            let res = params.gridRes;
            let cols = floor(W / res) + 1;
            let rows = floor(H / res) + 1;

            // Generate peaks with seeded positions
            let peaks = [];
            for (let i = 0; i < params.peakCount; i++) {
                peaks.push({
                    x: random(W * 0.1, W * 0.9),
                    y: random(H * 0.1, H * 0.9),
                    strength: random(0.15, 0.5),
                    radius: random(80, 220)
                });
            }

            // Build scalar field: layered Perlin noise + peak influence
            field = [];
            for (let y = 0; y < rows; y++) {
                field[y] = [];
                for (let x = 0; x < cols; x++) {
                    let px = x * res;
                    let py = y * res;

                    // Multi-octave noise
                    let val = 0;
                    let amp = 1;
                    let freq = params.noiseScale;
                    let maxAmp = 0;
                    for (let o = 0; o < params.octaves; o++) {
                        val += amp * noise(px * freq + params.seed * 0.1, py * freq + params.seed * 0.1);
                        maxAmp += amp;
                        amp *= 0.5;
                        freq *= 2.0;
                    }
                    val /= maxAmp;

                    // Peak influence — raise terrain near peaks
                    for (let p of peaks) {
                        let d = dist(px, py, p.x, p.y);
                        if (d < p.radius * 2) {
                            let influence = p.strength * exp(-d * d / (2 * p.radius * p.radius));
                            val += influence;
                        }
                    }

                    field[y][x] = val;
                }
            }

            // Extract contours using marching squares
            let levels = params.contourLevels;
            let minVal = 0.15;
            let maxVal = 0.85;

            noFill();
            strokeWeight(0.6);

            for (let l = 0; l < levels; l++) {
                let threshold = map(l, 0, levels - 1, minVal, maxVal);
                let normalizedLevel = l / (levels - 1);

                // Opacity: higher elevation = more visible
                let alpha = lerp(0.02, params.lineOpacity, normalizedLevel * normalizedLevel);

                // Color: subtle shift from white to cyan at peaks
                let r = lerp(255, 0, normalizedLevel * 0.3);
                let g = lerp(255, 212, normalizedLevel * 0.4);
                let b = lerp(255, 255, normalizedLevel * 0.2);

                stroke(r, g, b, alpha * 255);

                // March through grid
                for (let y = 0; y < rows - 1; y++) {
                    for (let x = 0; x < cols - 1; x++) {
                        let tl = field[y][x];
                        let tr = field[y][x + 1];
                        let br = field[y + 1][x + 1];
                        let bl = field[y + 1][x];

                        // Classify corners
                        let config = 0;
                        if (tl >= threshold) config |= 8;
                        if (tr >= threshold) config |= 4;
                        if (br >= threshold) config |= 2;
                        if (bl >= threshold) config |= 1;

                        // Skip empty and full cells
                        if (config === 0 || config === 15) continue;

                        let ax = x * res, ay = y * res;
                        let bx = (x + 1) * res, by = (y + 1) * res;

                        // Interpolation
                        let top = lerpVal(ax, bx, tl, tr, threshold);
                        let right = lerpVal(ay, by, tr, br, threshold);
                        let bottom = lerpVal(ax, bx, bl, br, threshold);
                        let left = lerpVal(ay, by, tl, bl, threshold);

                        // Draw line segments based on marching squares lookup
                        switch (config) {
                            case 1: case 14: line(ax, left, bottom, by); break;
                            case 2: case 13: line(bottom, by, bx, right); break;
                            case 3: case 12: line(ax, left, bx, right); break;
                            case 4: case 11: line(top, ay, bx, right); break;
                            case 5:
                                line(ax, left, top, ay);
                                line(bottom, by, bx, right);
                                break;
                            case 6: case 9: line(top, ay, bottom, by); break;
                            case 7: case 8: line(ax, left, top, ay); break;
                            case 10:
                                line(top, ay, bx, right);
                                line(ax, left, bottom, by);
                                break;
                        }
                    }
                }
            }
        }

        function lerpVal(a, b, va, vb, threshold) {
            if (abs(vb - va) < 0.0001) return (a + b) / 2;
            let t = (threshold - va) / (vb - va);
            return lerp(a, b, constrain(t, 0, 1));
        }

        function draw() {
            // Static — no animation needed
        }

        // UI Handlers
        function updateParam(paramName, value) {
            params[paramName] = parseFloat(value);
            document.getElementById(paramName + '-value').textContent = value;
            generateTerrain();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                generateTerrain();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            generateTerrain();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            generateTerrain();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            generateTerrain();
        }

        function resetParameters() {
            params = {...defaultParams};
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale;
            document.getElementById('contourLevels').value = params.contourLevels;
            document.getElementById('contourLevels-value').textContent = params.contourLevels;
            document.getElementById('octaves').value = params.octaves;
            document.getElementById('octaves-value').textContent = params.octaves;
            document.getElementById('peakCount').value = params.peakCount;
            document.getElementById('peakCount-value').textContent = params.peakCount;
            document.getElementById('lineOpacity').value = params.lineOpacity;
            document.getElementById('lineOpacity-value').textContent = params.lineOpacity;
            document.getElementById('gridRes').value = params.gridRes;
            document.getElementById('gridRes-value').textContent = params.gridRes;
            updateSeedDisplay();
            generateTerrain();
        }

        function downloadArt() {
            saveCanvas('invisible-terrain-seed-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
